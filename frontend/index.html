<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Garden Bistro — Order Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🌿 The Garden Bistro</h1>
    <p class="subtitle">Fresh food, straight to your table</p>
  </header>

  <main>
    <!-- CUSTOMER DETAILS SECTION -->
    <section class="card" id="customer-section">
      <h2>Your Details</h2>
      <div class="form-row">
        <label for="customer-name">Your Name</label>
        <input type="text" id="customer-name" placeholder="e.g. Maria Santos" />
      </div>
      <div class="form-row">
        <label for="customer-email">Your Email</label>
        <input type="email" id="customer-email" placeholder="e.g. maria@gmail.com" />
      </div>
      <div class="form-row">
        <label for="customer-note">Special Instructions (optional)</label>
        <textarea id="customer-note" rows="2" placeholder="e.g. No onions, allergic to nuts"></textarea>
      </div>
    </section>

    <!-- MENU SECTION -->
    <section id="menu-section">
      <h2>Our Menu</h2>
      <div class="menu-grid" id="menu-grid">
        <!-- Menu items are generated by JavaScript below -->
      </div>
    </section>

    <!-- CART SECTION -->
    <section class="card" id="cart-section">
      <h2>🛒 Your Order</h2>
      <div id="cart-items">
        <p class="empty-msg">Your cart is empty. Add items from the menu above!</p>
      </div>
      <div id="cart-total-row" class="cart-total-row hidden">
        <span>Total:</span>
        <span id="cart-total">₱0.00</span>
      </div>
      <button id="place-order-btn" class="btn-primary hidden" onclick="placeOrder()">
        ✅ Place Order
      </button>
      <p id="order-status" class="status-msg hidden"></p>
    </section>
  </main>

  <footer>
    <p>© 2025 The Garden Bistro. Powered by fresh ingredients and good vibes.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
